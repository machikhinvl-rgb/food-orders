<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Заказ еды</title>
    <style>
        /* ===== СТИЛИ (без изменений) ===== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            padding: 16px;
            padding-bottom: 80px;
            color: #1a1a2e;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .header h1 { font-size: 20px; font-weight: 700; }
        .admin-badge {
            background: #ffd166;
            color: #1a1a2e;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
        }
        .filter-section {
            background: white;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 16px;
        }
        .filter-section select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            background: white;
            margin-bottom: 8px;
        }
        .filter-section select:last-child { margin-bottom: 0; }
        .filter-section label {
            font-weight: 500;
            font-size: 14px;
            display: block;
            margin-bottom: 4px;
            color: #555;
        }
        .btn {
            background: #4361ee;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #3a56d4; }
        .btn-success { background: #06d6a0; }
        .btn-success:hover { background: #05b88a; }
        .btn-danger { background: #ef476f; }
        .btn-danger:hover { background: #d63d62; }
        .btn-warning { background: #ffd166; color: #1a1a2e; }
        .btn-warning:hover { background: #e6bc5c; }
        .btn-block { width: 100%; margin-top: 8px; }
        .btn-sm { padding: 4px 10px; font-size: 12px; }
        .week-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }
        .day-btn {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 8px 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
        }
        .day-btn.active {
            border-color: #4361ee;
            background: #eef2ff;
            font-weight: 600;
        }
        .day-btn .date-num { font-size: 16px; font-weight: 700; }
        .day-btn .date-name { font-size: 11px; color: #777; }
        .day-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 16px;
            border-left: 4px solid #4361ee;
        }
        .day-card .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .day-card .day-header .date {
            font-weight: 700;
            font-size: 16px;
        }
        .day-card .day-header .total {
            font-weight: 700;
            font-size: 16px;
            color: #4361ee;
        }
        .day-card .day-header .total.over { color: #ef476f; }
        .day-card .dish-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px solid #f0f4ff;
        }
        .day-card .dish-row:last-child { border-bottom: none; }
        .day-card .dish-row select {
            flex: 1;
            padding: 6px 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            background: white;
        }
        .day-card .dish-row .price {
            font-size: 14px;
            font-weight: 500;
            min-width: 50px;
            text-align: right;
        }
        .admin-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 8px 0;
        }
        .loading { text-align: center; padding: 40px 0; color: #777; }
        .empty { text-align: center; padding: 40px 0; color: #999; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2e;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        .toast.success { background: #06d6a0; }
        .toast.error { background: #ef476f; }
        .order-list {
            margin-top: 16px;
        }
        .order-item {
            background: white;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .order-item .info {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 14px;
        }
        .order-item .info .date { color: #777; }
        .order-item .info .dishes { font-weight: 500; }
        @media (max-width: 480px) {
            .week-grid { grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr 1fr; gap: 4px; }
            .day-btn { padding: 6px 2px; font-size: 10px; }
            .day-btn .date-num { font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🍱 Заказ еды</h1>
        <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
            <span id="userBadge" style="font-size:14px; color:#555;"></span>
            <button class="btn" onclick="location.reload()">🔄 Обновить</button>
        </div>
    </div>

    <div class="filter-section">
        <label for="cabinetSelect">🏢 Кабинет</label>
        <select id="cabinetSelect" onchange="onCabinetChange()">
            <option value="">— Выберите кабинет —</option>
        </select>

        <label for="userSelect">👤 Сотрудник</label>
        <select id="userSelect" onchange="onUserChange()" disabled>
            <option value="">— Сначала выберите кабинет —</option>
        </select>

        <!-- Административные кнопки (видны только админам) -->
        <div id="adminPanel" style="display:none; margin-top:8px;">
            <button class="btn btn-warning btn-block" onclick="openGoogleSheet()">📊 Открыть таблицу</button>
            <button class="btn btn-success btn-block" onclick="saveWeekOrders()">💾 Сохранить неделю</button>
            <button class="btn btn-danger btn-block" onclick="clearAllOrders()">🗑️ Очистить все заказы</button>
        </div>

        <!-- Кнопка сохранения для обычных пользователей -->
        <button class="btn btn-success btn-block" id="saveBtnUser" onclick="saveWeekOrders()">💾 Сохранить неделю</button>
    </div>

    <div id="weekSelector" style="display:none; margin-bottom:16px;">
        <label style="font-weight:500; font-size:14px; color:#555;">📅 Выберите день для заказа:</label>
        <div class="week-grid" id="weekGrid"></div>
    </div>

    <div id="dayOrdersContainer"></div>

    <!-- Список всех заказов (для админов) -->
    <div id="allOrdersContainer" style="display:none; margin-top:16px;">
        <h3 style="font-size:16px; margin-bottom:12px;">📋 Все заказы</h3>
        <div id="allOrdersList"></div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // ============================================================
        // ⚠️ ВАЖНО: ЗАМЕНИТЕ НА ВАШУ ССЫЛКУ НА СКРИПТ
        // ============================================================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyuZaxwgxDr6YhdPgn79ytPKFG5WnciDlwCbNCiWDErtf3TF4CLSoGNwJwLqid9BSl_gA/exec';

        // ============================================================
        // 🔐 СПИСОК АДМИНИСТРАТОРОВ (укажите почты или имена)
        // ============================================================
        const ADMIN_LIST = [
            'machikhin.vl@mailbox366.com',  // ваша почта
            // 'ekaterinapifagor12@gmail.com',        // пример: почта коллеги
        ];

        // ============================================================
        // ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
        // ============================================================
        let orders = [];
        let menu = {};
        let employees = [];
        let cabinets = [];
        let currentCabinet = '';
        let currentUser = '';
        let currentUserEmail = '';
        let selectedDate = '';
        let weekOrders = {};
        let isAdmin = false;

       // ============================================================
// 🔐 СПИСОК АДМИНИСТРАТОРОВ (только почты)
// ============================================================
const ADMIN_LIST = [
    'machikhin.vl@mailbox366.com',   // ← ваша почта
    // 'ekaterinapifagor12@gmail.com',          // ← почта другого админа
];

// ============================================================
// ОПРЕДЕЛЕНИЕ АДМИНИСТРАТОРА (только по email)
// ============================================================
async function checkAdmin() {
    let adminEmail = '';
    
    // Пытаемся получить email через Google API
    try {
        const res = await fetch('https://www.googleapis.com/oauth2/v2/userinfo?alt=json');
        if (res.ok) {
            const data = await res.json();
            adminEmail = data.email || '';
            console.log('📧 Email пользователя:', adminEmail);
        } else {
            console.warn('⚠️ Не удалось получить email (статус ' + res.status + ')');
            console.warn('👉 Проверьте, что вы залогинены в Google в этом браузере');
        }
    } catch (e) {
        console.warn('⚠️ Ошибка при получении email:', e.message);
        console.warn('👉 Проверьте интернет-соединение и настройки браузера');
    }

    // Проверяем, есть ли email в списке администраторов
    isAdmin = ADMIN_LIST.includes(adminEmail);

    // Обновляем интерфейс
    const adminPanel = document.getElementById('adminPanel');
    const saveBtnUser = document.getElementById('saveBtnUser');
    const allOrdersContainer = document.getElementById('allOrdersContainer');
    const userBadge = document.getElementById('userBadge');

    if (isAdmin) {
        adminPanel.style.display = 'block';
        saveBtnUser.style.display = 'none';
        allOrdersContainer.style.display = 'block';
        userBadge.innerHTML = `👑 Администратор (${adminEmail})`;
        console.log('✅ Права администратора подтверждены');
    } else {
        adminPanel.style.display = 'none';
        saveBtnUser.style.display = 'block';
        allOrdersContainer.style.display = 'none';
        if (adminEmail) {
            userBadge.textContent = `👤 ${adminEmail}`;
        } else {
            userBadge.textContent = '👤 Не авторизован';
        }
        console.log('👤 Обычный пользователь');
    }
}
        // ============================================================
        // ЗАГРУЗКА ДАННЫХ
        // ============================================================
        async function loadData() {
            try {
                const [ordersRes, menuRes, employeesRes, cabinetsRes] = await Promise.all([
                    fetch(`${SCRIPT_URL}?action=getOrders`),
                    fetch(`${SCRIPT_URL}?action=getMenu`),
                    fetch(`${SCRIPT_URL}?action=getEmployees`),
                    fetch(`${SCRIPT_URL}?action=getCabinets`)
                ]);

                const ordersJson = await ordersRes.json();
                const menuJson = await menuRes.json();
                const employeesJson = await employeesRes.json();
                const cabinetsJson = await cabinetsRes.json();

                if (ordersJson.success && Array.isArray(ordersJson.data)) orders = ordersJson.data;
                else orders = [];

                if (menuJson.success && typeof menuJson.data === 'object') menu = menuJson.data;
                else menu = {};

                if (employeesJson.success && Array.isArray(employeesJson.data)) employees = employeesJson.data;
                else employees = [];

                if (cabinetsJson.success && Array.isArray(cabinetsJson.data)) cabinets = cabinetsJson.data;
                else cabinets = [];

                populateCabinets();
                
                // Если админ — показываем все заказы
                if (isAdmin) {
                    renderAllOrders();
                }
                
                console.log('✅ Данные загружены');
            } catch (e) {
                console.error('Ошибка загрузки:', e);
                showToast('❌ Ошибка загрузки данных', 'error');
            }
        }

        // ============================================================
        // ОСТАЛЬНЫЕ ФУНКЦИИ (без изменений из предыдущей версии)
        // ============================================================
        function populateCabinets() {
            const select = document.getElementById('cabinetSelect');
            select.innerHTML = '<option value="">— Выберите кабинет —</option>';
            cabinets.sort().forEach(cab => {
                const opt = document.createElement('option');
                opt.value = cab;
                opt.textContent = cab;
                select.appendChild(opt);
            });
        }

        function onCabinetChange() {
            const select = document.getElementById('cabinetSelect');
            currentCabinet = select.value;
            const userSelect = document.getElementById('userSelect');
            userSelect.innerHTML = '<option value="">— Выберите сотрудника —</option>';
            userSelect.disabled = !currentCabinet;

            if (currentCabinet) {
                const filtered = employees.filter(emp => emp.cabinet === currentCabinet);
                filtered.forEach(emp => {
                    const opt = document.createElement('option');
                    opt.value = emp.name;
                    opt.textContent = emp.name;
                    userSelect.appendChild(opt);
                });
            }
            
            currentUser = '';
            document.getElementById('weekSelector').style.display = 'none';
            document.getElementById('dayOrdersContainer').innerHTML = '';
        }

        function onUserChange() {
            const select = document.getElementById('userSelect');
            currentUser = select.value;
            if (currentUser) {
                sessionStorage.setItem('currentUser', currentUser);
                initWeek();
            } else {
                document.getElementById('weekSelector').style.display = 'none';
                document.getElementById('dayOrdersContainer').innerHTML = '';
            }
        }

        function initWeek() {
            if (!currentUser) return;
            
            const weekDates = getWeekDates();
            const weekContainer = document.getElementById('weekGrid');
            weekContainer.innerHTML = '';
            
            weekOrders = getWeekOrdersFromStorage();

            weekDates.forEach(date => {
                const dateStr = date.toISOString().split('T')[0];
                const dayName = date.toLocaleDateString('ru-RU', { weekday: 'short' });
                const dayNum = date.getDate();
                
                const btn = document.createElement('div');
                btn.className = 'day-btn';
                if (dateStr === selectedDate) btn.classList.add('active');
                btn.innerHTML = `
                    <div class="date-num">${dayNum}</div>
                    <div class="date-name">${dayName}</div>
                    <div style="font-size:10px; color:#999; margin-top:4px;">
                        ${weekOrders[dateStr]?.total || 0} ₽
                    </div>
                `;
                btn.onclick = () => selectDay(dateStr);
                weekContainer.appendChild(btn);
            });

            document.getElementById('weekSelector').style.display = 'block';
            
            if (!selectedDate) {
                const today = new Date().toISOString().split('T')[0];
                const weekDatesStr = weekDates.map(d => d.toISOString().split('T')[0]);
                if (weekDatesStr.includes(today)) {
                    selectDay(today);
                } else {
                    selectDay(weekDatesStr[0]);
                }
            } else {
                renderDayOrders(selectedDate);
            }
        }

        function getWeekDates() {
            const now = new Date();
            const dayOfWeek = now.getDay();
            const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
            const monday = new Date(now);
            monday.setDate(now.getDate() + mondayOffset);
            
            const dates = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date(monday);
                d.setDate(monday.getDate() + i);
                dates.push(d);
            }
            return dates;
        }

        function getWeekOrdersFromStorage() {
            const saved = sessionStorage.getItem(`weekOrders_${currentUser}`);
            if (saved) {
                try {
                    return JSON.parse(saved);
                } catch (e) {}
            }
            
            const weekDates = getWeekDates();
            const result = {};
            weekDates.forEach(date => {
                const dateStr = date.toISOString().split('T')[0];
                const existingOrder = orders.find(o => o.Сотрудник === currentUser && o.Дата === dateStr);
                if (existingOrder) {
                    const dishes = [];
                    for (let i = 1; i <= 5; i++) {
                        const dish = existingOrder[`Блюдо_${i}`];
                        if (dish) dishes.push(dish);
                    }
                    const total = parseInt(existingOrder.Сумма) || 0;
                    result[dateStr] = { dishes, total };
                } else {
                    result[dateStr] = { dishes: [], total: 0 };
                }
            });
            return result;
        }

        function selectDay(dateStr) {
            selectedDate = dateStr;
            
            document.querySelectorAll('.day-btn').forEach(btn => {
                btn.classList.remove('active');
                const btnDate = btn.querySelector('.date-num')?.textContent;
                const dateObj = new Date(dateStr);
                if (btnDate && parseInt(btnDate) === dateObj.getDate()) {
                    btn.classList.add('active');
                }
            });
            
            renderDayOrders(dateStr);
        }

        function renderDayOrders(dateStr) {
            const container = document.getElementById('dayOrdersContainer');
            const dateObj = new Date(dateStr);
            const displayDate = dateObj.toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });
            const dayOrders = weekOrders[dateStr] || { dishes: [], total: 0 };

            let html = `
                <div class="day-card">
                    <div class="day-header">
                        <span class="date">${displayDate}</span>
                        <span class="total ${dayOrders.total > 520 ? 'over' : ''}">
                            Итого: ${dayOrders.total} ₽ ${dayOrders.total > 520 ? '⚠️' : ''}
                        </span>
                    </div>
                    <div class="day-dishes">
            `;

            for (let i = 0; i < 5; i++) {
                const dishName = dayOrders.dishes[i] || '';
                html += `
                    <div class="dish-row">
                        <select class="dish-select" data-date="${dateStr}" data-index="${i}" onchange="updateDayTotal('${dateStr}')">
                            <option value="">—</option>
                `;
                Object.keys(menu).sort().forEach(dish => {
                    const selected = dish === dishName ? 'selected' : '';
                    html += `<option value="${dish}" ${selected}>${dish}</option>`;
                });
                html += `
                        </select>
                        <span class="price" id="price-${dateStr}-${i}">${dishName ? (menu[dishName] || 0) : 0} ₽</span>
                    </div>
                `;
            }

            html += `
                    </div>
                </div>
            `;

            container.innerHTML = html;

            document.querySelectorAll('.dish-select').forEach(sel => {
                const date = sel.dataset.date;
                const index = parseInt(sel.dataset.index);
                updatePriceForSelect(date, index);
            });
        }

        function updateDayTotal(dateStr) {
            const selects = document.querySelectorAll(`.dish-select[data-date="${dateStr}"]`);
            let total = 0;
            const dishes = [];
            selects.forEach(sel => {
                const dish = sel.value;
                const price = menu[dish] || 0;
                total += price;
                if (dish) dishes.push(dish);
                const index = parseInt(sel.dataset.index);
                const priceSpan = document.getElementById(`price-${dateStr}-${index}`);
                if (priceSpan) priceSpan.textContent = price + ' ₽';
            });
            
            const card = document.querySelector(`.day-card`);
            if (card) {
                const totalSpan = card.querySelector('.total');
                if (totalSpan) {
                    totalSpan.textContent = `Итого: ${total} ₽ ${total > 520 ? '⚠️' : ''}`;
                    totalSpan.classList.toggle('over', total > 520);
                }
            }

            weekOrders[dateStr] = { dishes, total };
            sessionStorage.setItem(`weekOrders_${currentUser}`, JSON.stringify(weekOrders));
            updateWeekSummary();
        }

        function updatePriceForSelect(date, index) {
            const select = document.querySelector(`.dish-select[data-date="${date}"][data-index="${index}"]`);
            const priceSpan = document.getElementById(`price-${date}-${index}`);
            if (select && priceSpan) {
                const dish = select.value;
                const price = menu[dish] || 0;
                priceSpan.textContent = price + ' ₽';
            }
        }

        function updateWeekSummary() {
            const weekDates = getWeekDates();
            const dayBtns = document.querySelectorAll('.day-btn');
            dayBtns.forEach((btn, idx) => {
                if (idx < weekDates.length) {
                    const dateStr = weekDates[idx].toISOString().split('T')[0];
                    const order = weekOrders[dateStr] || { total: 0 };
                    const summary = btn.querySelector('div:last-child');
                    if (summary) {
                        summary.textContent = `${order.total} ₽`;
                    }
                }
            });
        }

        async function saveWeekOrders() {
            if (!currentUser) {
                showToast('Выберите сотрудника!', 'error');
                return;
            }

            sessionStorage.setItem(`weekOrders_${currentUser}`, JSON.stringify(weekOrders));

            let hasErrors = false;
            let savedCount = 0;

            for (const [dateStr, data] of Object.entries(weekOrders)) {
                if (data.total === 0) continue;
                if (data.total > 520) {
                    showToast(`Превышен лимит на ${dateStr}!`, 'error');
                    hasErrors = true;
                    continue;
                }

                const orderData = {
                    Дата: dateStr,
                    Кабинет: currentCabinet,
                    Сотрудник: currentUser,
                    Сумма: data.total
                };
                for (let i = 0; i < 5; i++) {
                    orderData[`Блюдо_${i+1}`] = data.dishes[i] || '';
                }

                try {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'saveOrder', data: orderData })
                    });
                    savedCount++;
                } catch (e) {
                    console.error('Ошибка сохранения:', e);
                    hasErrors = true;
                }
            }

            if (hasErrors && savedCount === 0) {
                showToast('❌ Ошибка сохранения!', 'error');
            } else if (hasErrors) {
                showToast(`⚠️ Частично сохранено (${savedCount} дней)`, 'error');
            } else if (savedCount > 0) {
                showToast(`✅ Сохранено ${savedCount} дней!`, 'success');
            } else {
                showToast('Нет заказов для сохранения', 'error');
            }

            await loadData();
            initWeek();
            if (isAdmin) renderAllOrders();
        }

        // ============================================================
        // АДМИНИСТРАТОРСКИЕ ФУНКЦИИ
        // ============================================================

        // Открыть Google Таблицу
        function openGoogleSheet() {
            // Получаем ID таблицы из ссылки на скрипт
            // Или просто открываем таблицу по известной ссылке
            const sheetUrl = 'https://docs.google.com/spreadsheets/d/1iGENcTfUNZDRrKylCeB1dd4enOjVNiDesXVbpee35_c/edit'; // Замените на вашу ссылку
            window.open(sheetUrl, '_blank');
        }

        // Показать все заказы (для админа)
        function renderAllOrders() {
            const container = document.getElementById('allOrdersList');
            if (!orders || orders.length === 0) {
                container.innerHTML = '<div class="empty">📭 Нет заказов</div>';
                return;
            }

            // Сортируем по дате (сначала новые)
            const sorted = [...orders].sort((a, b) => {
                return (b.Дата || '').localeCompare(a.Дата || '');
            });

            container.innerHTML = sorted.map((order, idx) => {
                const dishes = [];
                for (let i = 1; i <= 5; i++) {
                    const dish = order[`Блюдо_${i}`];
                    if (dish && dish.trim() !== '') {
                        dishes.push(dish);
                    }
                }
                const dishesStr = dishes.join(', ') || '—';
                const realIndex = orders.indexOf(order);
                let dateStr = order.Дата || '—';
                if (dateStr && dateStr.includes('T')) {
                    try {
                        const d = new Date(dateStr);
                        if (!isNaN(d.getTime())) {
                            dateStr = d.toLocaleDateString('ru-RU');
                        }
                    } catch (e) {}
                }

                return `
                    <div class="order-item">
                        <div class="info">
                            <span><strong>${order.Сотрудник || '—'}</strong></span>
                            <span class="date">${dateStr}</span>
                            <span class="dishes">${dishesStr}</span>
                            <span><strong>${order.Сумма || 0} ₽</strong></span>
                        </div>
                        <button class="btn btn-danger btn-sm" onclick="deleteOrder(${realIndex})">🗑️</button>
                    </div>
                `;
            }).join('');
        }

        // Удалить заказ (для админа)
        async function deleteOrder(index) {
            if (!isAdmin) {
                showToast('У вас нет прав для удаления заказов', 'error');
                return;
            }
            
            const order = orders[index];
            if (!order) return;
            
            if (!confirm(`Удалить заказ ${order.Сотрудник} на ${order.Дата}?`)) return;
            
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'deleteOrder', rowIndex: index })
                });
                showToast('🗑️ Заказ удалён', 'success');
                await loadData();
                if (isAdmin) renderAllOrders();
                initWeek();
            } catch (e) {
                showToast('❌ Ошибка удаления', 'error');
                console.error(e);
            }
        }

        // Очистить все заказы (только для админа!)
        async function clearAllOrders() {
            if (!isAdmin) {
                showToast('У вас нет прав для этого действия', 'error');
                return;
            }
            
            if (!confirm('⚠️ ВНИМАНИЕ! Это действие удалит ВСЕ заказы из таблицы. Продолжить?')) return;
            if (!confirm('Вы уверены? Это необратимо!')) return;

            let deleted = 0;
            for (let i = orders.length - 1; i >= 0; i--) {
                try {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'deleteOrder', rowIndex: i })
                    });
                    deleted++;
                } catch (e) {
                    console.error('Ошибка удаления:', e);
                }
            }

            showToast(`🗑️ Удалено ${deleted} заказов`, 'success');
            await loadData();
            if (isAdmin) renderAllOrders();
            initWeek();
        }

        // ============================================================
        // TOAST УВЕДОМЛЕНИЯ
        // ============================================================
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ============================================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================================
        document.addEventListener('DOMContentLoaded', async () => {
            await checkAdmin();
            await loadData();
            
            const savedUser = sessionStorage.getItem('currentUser');
            if (savedUser) {
                const userSelect = document.getElementById('userSelect');
                setTimeout(() => {
                    for (let opt of userSelect.options) {
                        if (opt.value === savedUser) {
                            userSelect.value = savedUser;
                            onUserChange();
                            break;
                        }
                    }
                }, 300);
            }
        });

        // Глобальные функции для onclick в HTML
        window.onCabinetChange = onCabinetChange;
        window.onUserChange = onUserChange;
        window.selectDay = selectDay;
        window.updateDayTotal = updateDayTotal;
        window.saveWeekOrders = saveWeekOrders;
        window.deleteOrder = deleteOrder;
        window.clearAllOrders = clearAllOrders;
        window.openGoogleSheet = openGoogleSheet;
        window.showToast = showToast;
    </script>
</body>
</html>
