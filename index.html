<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Заказ еды</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <header class="topbar">
    <div class="topbar-title">🍽️ Заказ еды</div>
    <button id="refreshBtn" class="btn btn-outline">🔄 Обновить</button>
  </header>

  <div id="statusMsg" class="status-msg top-status"></div>

  <!-- ЭКРАН ВХОДА: показывается один раз, дальше выбор запоминается -->
  <section class="card" id="loginCard">
    <div class="field-label">👋 Давайте познакомимся</div>

    <label class="field">
      <span class="field-label">🏢 Офис</span>
      <select id="officeSelect"></select>
    </label>

    <label class="field">
      <span class="field-label">🗄️ Кабинет</span>
      <select id="cabinetSelect"><option value="">Загрузка…</option></select>
    </label>

    <label class="field">
      <span class="field-label">👤 Сотрудник</span>
      <select id="employeeSelect"><option value="">Сначала выберите кабинет</option></select>
    </label>

    <label class="field">
      <span class="field-label">Email (для уведомлений, необязательно)</span>
      <input type="email" id="loginEmail" placeholder="you@example.com">
    </label>

    <button id="loginBtn" class="btn btn-primary">Войти</button>
    <div id="loginStatusMsg" class="status-msg"></div>
  </section>

  <!-- ОСНОВНОЙ ЭКРАН: показывается после входа -->
  <div id="mainScreen" style="display:none;">

    <section class="card user-bar">
      <span id="userBarText"></span>
      <button id="switchUserBtn" class="btn btn-outline">Сменить</button>
    </section>

    <section class="card">
      <button type="button" id="openShiftsBtn" class="day-section-header">
        <span>📆 Мои рабочие смены</span>
        <span class="week-range-label">открыть</span>
      </button>
    </section>

    <section class="card">
      <button type="button" id="daySectionHeader" class="day-section-header">
        <span>📅 Выберите день/неделю для заказа</span>
        <span id="weekRangeLabel" class="week-range-label"></span>
      </button>
      <div id="weekSwitcher" class="week-toggle" style="display:none;"></div>
      <div id="dayTabs" class="day-tabs"></div>
    </section>

    <section class="card day-detail">
      <div class="day-detail-header">
        <span id="dayTitle">—</span>
        <span id="dayTotal" class="day-total">Итого: 0 ₽</span>
      </div>
      <div id="slotsList" class="slots-list"></div>
      <button id="saveWeekBtn" class="btn btn-primary" style="margin-top:14px;">💾 Сохранить неделю</button>
    </section>

    <section class="card" id="profileCard">
      <div class="field-label">🔔 Уведомления</div>

      <label class="field">
        <span class="field-label">Email</span>
        <div class="profile-row">
          <input type="email" id="profileEmail" placeholder="you@example.com">
          <button id="saveEmailBtn" class="btn btn-outline">Сохранить</button>
        </div>
      </label>

      <div class="field">
        <span class="field-label">Telegram</span>
        <div id="telegramStatus"></div>
      </div>

      <div id="profileStatusMsg" class="status-msg"></div>
    </section>

  </div>

  <!-- ВСПЛЫВАЮЩЕЕ ОКНО: календарь рабочих смен -->
  <div id="shiftsModalOverlay" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <div class="modal-header">
        <span class="field-label">📆 Мои рабочие смены</span>
        <button type="button" id="closeShiftsModal" class="modal-close">✕</button>
      </div>
      <div class="hint-text">Отметьте рабочие дни на месяц вперёд — если в этот день не будет заказа, придёт напоминание (за сутки и в сам день)</div>
      <div class="shifts-month-nav">
        <button type="button" id="shiftsPrevMonth" class="btn btn-outline">◀</button>
        <span id="shiftsMonthLabel"></span>
        <button type="button" id="shiftsNextMonth" class="btn btn-outline">▶</button>
      </div>
      <div id="shiftsCalendar" class="shifts-calendar"></div>
      <button id="saveShiftsBtn" class="btn btn-primary" style="margin-top:12px;">Сохранить</button>
      <div id="shiftsStatusMsg" class="status-msg"></div>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
