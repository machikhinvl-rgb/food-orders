<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Заказ еды</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <header class="topbar">
    <div class="topbar-title">🍽️ Заказ еды</div>
    <button id="refreshBtn" class="btn btn-outline">🔄 Обновить</button>
  </header>

  <section class="card">
    <label class="field">
      <span class="field-label">🏢 Офис</span>
      <select id="officeSelect"></select>
    </label>

    <label class="field">
      <span class="field-label">📅 Неделя</span>
      <div id="weekToggle" class="week-toggle"></div>
    </label>

    <label class="field">
      <span class="field-label">🗄️ Кабинет</span>
      <select id="cabinetSelect"><option value="">Загрузка…</option></select>
    </label>

    <label class="field">
      <span class="field-label">👤 Сотрудник</span>
      <select id="employeeSelect"><option value="">Сначала выберите кабинет</option></select>
    </label>

    <button id="saveWeekBtn" class="btn btn-primary">💾 Сохранить неделю</button>

    <div id="statusMsg" class="status-msg"></div>
    <!-- Кнопка "Вход через Google" убрана: выбор кабинет+ФИО достаточен как идентификация -->

  </section>

  <section class="card" id="profileCard" style="display:none;">
    <div class="field-label">🔔 Уведомления</div>

    <label class="field">
      <span class="field-label">Email</span>
      <div class="profile-row">
        <input type="email" id="profileEmail" placeholder="you@example.com">
        <button id="saveEmailBtn" class="btn btn-outline">Сохранить</button>
      </div>
    </label>

    <div class="field">
      <span class="field-label">Telegram</span>
      <div id="telegramStatus"></div>
    </div>

    <div id="profileStatusMsg" class="status-msg"></div>
  </section>

  <section class="card">
    <div class="field-label">📅 Выберите день для заказа:</div>
    <div id="dayTabs" class="day-tabs"></div>
  </section>

  <section class="card day-detail">
    <div class="day-detail-header">
      <span id="dayTitle">—</span>
      <span id="dayTotal" class="day-total">Итого: 0 ₽</span>
    </div>
    <div id="slotsList" class="slots-list"></div>
  </section>

</div>

<script src="script.js"></script>
</body>
</html>
